name: EMA20 Alert Scanner

# Runs every 15 minutes. The scanner itself exits silently outside NSE
# market hours (configurable via MARKET_HOURS_ONLY in alert_config.py).
#
# Required GitHub Secrets (repo → Settings → Secrets → Actions):
#   GMAIL_USER          — sender Gmail address
#   GMAIL_APP_PASSWORD  — Gmail App Password (NOT your login password)
#   SENDGRID_API_KEY    — SendGrid API key  (optional fallback)
#
# To create a Gmail App Password:
#   1. Enable 2-Step Verification on the Gmail account.
#   2. Google Account → Security → App Passwords → Mail → Generate.
#   3. Copy the 16-character password into the secret.

on:
  schedule:
    - cron: '*/15 * * * *'   # every 15 minutes
  workflow_dispatch:           # manual trigger from Actions tab
    inputs:
      force_run:
        description: 'Ignore market hours (true = run even when market closed)'
        required: false
        default: 'false'

permissions:
  contents: write    # needed so the job can commit state/logs back

jobs:
  scan:
    name: EMA20 Crossover Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: ema_alert_engine/requirements.txt

      - name: Install dependencies
        working-directory: ema_alert_engine
        run: pip install -r requirements.txt

      - name: Override market hours guard (manual force run)
        if: github.event.inputs.force_run == 'true'
        working-directory: ema_alert_engine
        run: |
          sed -i 's/^MARKET_HOURS_ONLY = True/MARKET_HOURS_ONLY = False/' \
              config/alert_config.py
          echo "Market hours guard disabled for this run"

      - name: Run EMA20 scanner
        working-directory: ema_alert_engine
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
        run: python run_scanner.py

      # Commit updated state/logs back to the repo.
      # [skip ci] prevents this commit from re-triggering the workflow.
      - name: Commit state and logs
        run: |
          git config user.name  "EMA Alert Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ema_alert_engine/state/ ema_alert_engine/logs/
          git diff --staged --quiet \
            || git commit -m "chore: alert state $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push
