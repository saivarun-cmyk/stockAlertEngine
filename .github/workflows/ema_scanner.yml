name: EMA20 Alert Scanner

on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch:
    inputs:
      force_run:
        description: 'Ignore market hours (true = run even when market closed)'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  scan:
    name: EMA20 Crossover Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Override market hours guard
        if: github.event.inputs.force_run == 'true'
        run: |
          sed -i 's/^MARKET_HOURS_ONLY = True/MARKET_HOURS_ONLY = False/' config/alert_config.py
          echo "Market hours guard disabled"

      - name: Run EMA20 scanner
        env:
          GMAIL_USER:         ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SENDGRID_API_KEY:   ${{ secrets.SENDGRID_API_KEY }}
        run: python run_scanner.py

      - name: Commit state and logs
        run: |
          git config user.name  "EMA Alert Bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state/ logs/
          git diff --staged --quiet \
            || git commit -m "chore: alert state $(date -u +%Y-%m-%dT%H:%MZ) [skip ci]"
          git push
